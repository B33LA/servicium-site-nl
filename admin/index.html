<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Servicium CMS – Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy: #0f1f3d;
      --teal: #3d7a6f;
      --teal-dark: #2f5f56;
      --gold: #c9a84c;
      --bg: #0b1629;
      --card-bg: #142040;
      --border: rgba(255,255,255,0.08);
      --text: #e8eaf0;
      --muted: #8892a4;
      --error: #e05c5c;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
    }

    .login-wrapper {
      width: 100%;
      max-width: 420px;
      padding: 2rem;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      justify-content: center;
      margin-bottom: 2.5rem;
      text-decoration: none;
    }

    .logo-icon {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--teal), var(--gold));
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
      font-size: 1.25rem;
      color: #fff;
    }

    .logo-name {
      font-size: 1.5rem;
      font-weight: 700;
      color: #fff;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.25rem 2rem;
    }

    .card h1 {
      font-size: 1.3rem;
      font-weight: 700;
      margin-bottom: 0.4rem;
    }

    .card p {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 1.75rem;
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    input {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      color: var(--text);
      font-size: 0.95rem;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input:focus {
      outline: none;
      border-color: var(--teal);
    }

    input::placeholder { color: var(--muted); }

    .btn {
      width: 100%;
      padding: 0.85rem;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 0.95rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      margin-top: 0.5rem;
      transition: background 0.2s;
    }

    .btn:hover { background: var(--teal-dark); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }

    .error-msg {
      background: rgba(224, 92, 92, 0.12);
      border: 1px solid rgba(224, 92, 92, 0.3);
      color: var(--error);
      border-radius: 8px;
      padding: 0.75rem 1rem;
      font-size: 0.85rem;
      margin-top: 1rem;
      display: none;
    }

    .footer-note {
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
      margin-top: 1.5rem;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <a href="/" class="logo">
      <div class="logo-icon">S</div>
      <span class="logo-name">Servicium</span>
    </a>

    <div class="card">
      <h1>Admin Login</h1>
      <p>Sign in to access the Servicium CMS dashboard.</p>

      <form id="login-form" novalidate>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter admin password" required autocomplete="current-password" />
        </div>
        <button type="submit" class="btn" id="submit-btn">Sign In</button>
        <div class="error-msg" id="error-msg"></div>
      </form>
    </div>

    <p class="footer-note">© 2025 Servicium. CMS v1.0</p>
  </div>

  <script>
    // Redirect if already logged in
    const token = localStorage.getItem('cms_token');
    if (token) {
      fetch('/api/auth/verify', { headers: { Authorization: 'Bearer ' + token } })
        .then(r => { if (r.ok) window.location.href = '/admin/dashboard'; })
        .catch(() => {});
    }

    document.getElementById('login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit-btn');
      const errorMsg = document.getElementById('error-msg');

      errorMsg.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Signing in…';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password })
        });
        const data = await res.json();

        if (res.ok && data.token) {
          localStorage.setItem('cms_token', data.token);
          window.location.href = '/admin/dashboard';
        } else {
          errorMsg.textContent = data.error || 'Invalid password. Please try again.';
          errorMsg.style.display = 'block';
        }
      } catch (err) {
        errorMsg.textContent = 'Connection error. Please try again.';
        errorMsg.style.display = 'block';
      } finally {
        btn.disabled = false;
        btn.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
